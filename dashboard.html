<!DOCTYPE html>
<html>
<head>
  <title>Review SaaS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f6;
      color: #111;
    }

    header {
      background: #111;
      color: white;
      padding: 22px;
    }

    main {
      padding: 22px;
      max-width: 1100px;
      margin: auto;
    }

    h1 {
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin: 22px 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }

    .number {
      font-size: 34px;
      font-weight: 900;
      margin-top: 8px;
    }

    .label {
      color: #666;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #111;
      color: white;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 18px 0;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      min-width: 240px;
    }

    button,
    a.btn {
      background: #111;
      color: white;
      border: 0;
      padding: 12px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <h1>Review SaaS Dashboard</h1>
    <p>Employee + business tracking</p>
  </header>

  <main>

    <div class="topbar">
      <input id="filter" placeholder="Filter by employee or business..." oninput="render()" />
      <button onclick="loadStats()">Refresh Stats</button>
      <a class="btn" href="admin.html">Manage Businesses</a>
      <a class="btn" href="index.html?employee=demo">Test Review Page</a>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Total Scans</div>
        <div class="number" id="totalScans">0</div>
      </div>

      <div class="card">
        <div class="label">Unique Scans</div>
        <div class="number" id="totalUnique">0</div>
      </div>

      <div class="card">
        <div class="label">Reviews Copied</div>
        <div class="number" id="totalCopied">0</div>
      </div>

      <div class="card">
        <div class="label">Google Clicks</div>
        <div class="number" id="totalClicks">0</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Employee</th>
          <th>Business</th>
          <th>Scans</th>
          <th>Unique</th>
          <th>Copied</th>
          <th>Google Clicks</th>
          <th>Conversion</th>
        </tr>
      </thead>

      <tbody id="statsBody"></tbody>
    </table>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
      authDomain: "envisionedmktng.firebaseapp.com",
      projectId: "envisionedmktng",
      storageBucket: "envisionedmktng.firebasestorage.app",
      messagingSenderId: "1075132261537",
      appId: "1:1075132261537:web:2c283114b82d1cee4efce0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let rows = [];

    function n(value) {
      return Number(value || 0);
    }

    window.loadStats = async function () {
      const snap = await getDocs(collection(db, "stats"));

      rows = snap.docs.map(d => ({
        id: d.id,
        ...d.data()
      }));

      render();
    };

    window.render = function () {
      const filter = document.getElementById("filter").value.toLowerCase();

      const filtered = rows.filter(r =>
        String(r.employeeId || "").toLowerCase().includes(filter) ||
        String(r.businessName || "").toLowerCase().includes(filter)
      );

      const totals = filtered.reduce((a, r) => {
        a.scans += n(r.scans);
        a.unique += n(r.uniqueScans);
        a.copied += n(r.copiedReviews);
        a.clicks += n(r.reviewClicks);
        return a;
      }, {
        scans: 0,
        unique: 0,
        copied: 0,
        clicks: 0
      });

      document.getElementById("totalScans").innerText = totals.scans;
      document.getElementById("totalUnique").innerText = totals.unique;
      document.getElementById("totalCopied").innerText = totals.copied;
      document.getElementById("totalClicks").innerText = totals.clicks;

      document.getElementById("statsBody").innerHTML = filtered.map(r => {
        const scans = n(r.scans);
        const clicks = n(r.reviewClicks);
        const conversion = scans ? Math.round((clicks / scans) * 100) + "%" : "0%";

        return `
          <tr>
            <td>${r.employeeId || ""}</td>
            <td>${r.businessName || r.businessId || ""}</td>
            <td>${n(r.scans)}</td>
            <td>${n(r.uniqueScans)}</td>
            <td>${n(r.copiedReviews)}</td>
            <td>${n(r.reviewClicks)}</td>
            <td>${conversion}</td>
          </tr>
        `;
      }).join("");
    };

    loadStats();
  </script>

</body>
</html>
