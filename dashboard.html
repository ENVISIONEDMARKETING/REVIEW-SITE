<!DOCTYPE html>
<html>
<head>
  <title>Review SaaS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      margin: 0;
      background: #f3f4f6;
    }

    header {
      background: #111;
      color: white;
      padding: 25px;
      text-align: center;
    }

    main {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background: #111;
      color: white;
    }

    button {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-top: 5px;
    }

    .green { background:#1db954; color:white; }
    .gray { background:#777; color:white; }
    .danger { background:#b00020; color:white; }

    input {
      padding: 6px;
      width: 70px;
      border-radius: 6px;
      border:1px solid #ccc;
    }
  </style>
</head>

<body>

<header>
  <h1>ENVISIONED MARKETING Dashboard</h1>
  <p>Verified Google Review Tracking System</p>
</header>

<main>

<div class="card">
  <h2>Business Review Control</h2>

  <table>
    <thead>
      <tr>
        <th>Business</th>
        <th>Verified Reviews</th>
        <th>Monthly Limit</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="businessTable"></tbody>
  </table>

</div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "envisionedmktng.firebaseapp.com",
  projectId: "envisionedmktng"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function getMonthKey() {
  return new Date().toISOString().slice(0,7);
}

async function loadDashboard() {

  const businessesSnap = await db.collection("businesses").get();
  const logsSnap = await db.collection("activityLogs").get();

  const logs = logsSnap.docs.map(d => d.data());

  const rows = [];

  businessesSnap.forEach(doc => {
    const b = { id: doc.id, ...doc.data() };

    const verifiedCount = logs.filter(l =>
      l.businessId === b.id &&
      l.type === "verifiedReview" &&
      l.month === getMonthKey()
    ).length;

    rows.push({ ...b, verifiedCount });
  });

  document.getElementById("businessTable").innerHTML = rows.map(b => `
    <tr>
      <td><strong>${b.name || b.id}</strong></td>

      <td>${b.verifiedCount}</td>

      <td>
        <input id="limit_${b.id}" value="${b.monthlyLimit || 30}" />
        <button onclick="saveLimit('${b.id}')">Save</button>
      </td>

      <td>
        <button class="green" onclick="addVerified('${b.id}','${b.name}')">
          + Verified
        </button>

        <button class="gray" onclick="resetMonth('${b.id}')">
          Reset
        </button>
      </td>
    </tr>
  `).join("");
}

async function saveLimit(id) {
  const val = document.getElementById("limit_" + id).value;

  await db.collection("businesses").doc(id).set({
    monthlyLimit: Number(val)
  }, { merge:true });

  alert("Limit updated");
}

async function addVerified(businessId, name) {

  await db.collection("activityLogs").add({
    type: "verifiedReview",
    businessId,
    businessName: name,
    date: new Date().toISOString().split("T")[0],
    month: getMonthKey(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Verified review added");

  loadDashboard();
}

async function resetMonth(businessId) {

  if (!confirm("Reset this month's verified reviews?")) return;

  const snap = await db.collection("activityLogs")
    .where("businessId","==",businessId)
    .where("month","==",getMonthKey())
    .where("type","==","verifiedReview")
    .get();

  const batch = db.batch();

  snap.forEach(doc => batch.delete(doc.ref));

  await batch.commit();

  alert("Reset complete");

  loadDashboard();
}

loadDashboard();
</script>

</body>
</html>
