<!DOCTYPE html>
<html>
<head>
  <title>Employee Login | ENVISIONED MARKETING</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #2b2b2b, #050505 65%);
      display: flex; align-items: center; justify-content: center;
      padding: 22px; color: #111;
    }
    .card {
      width: 100%; max-width: 430px; background: #fff;
      border-radius: 26px; padding: 30px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.45);
    }
    .brand { text-align: center; font-size: 13px; letter-spacing: 2.5px; font-weight: 800; color: #777; }
    h1 { text-align: center; font-size: 30px; }
    .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
    input {
      width: 100%; padding: 15px; margin-bottom: 15px;
      border-radius: 14px; border: 1px solid #d5d5d5; font-size: 16px;
    }
    button {
      width: 100%; padding: 15px; border-radius: 14px;
      border: none; font-weight: 800; margin-top: 10px;
    }
    .primary { background: #111; color: white; }
    .secondary { background: #f2f2f2; }
    .danger { background: #fff0f0; color: #a00000; }
    .message {
      display: none; margin-top: 15px; padding: 12px;
      border-radius: 12px; text-align: center;
    }
    .error { background: #ffe5e5; color: #9b0000; }
    .success { background: #e8ffe8; color: #006600; }
  </style>
</head>

<body>
  <div class="card">
    <div class="brand">ENVISIONED MARKETING</div>
    <h1>Employee Login</h1>

    <p class="subtitle">Access your dashboard</p>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button class="primary" onclick="login()">Login</button>
    <button class="secondary" onclick="signup()">Create Account</button>
    <button class="danger" onclick="resetPassword()">Reset Password</button>

    <div id="messageBox" class="message"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
      authDomain: "envisionedmktng.firebaseapp.com",
      projectId: "envisionedmktng"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    await setPersistence(auth, browserLocalPersistence);

    function showMessage(text, type) {
      const box = document.getElementById("messageBox");
      box.innerText = text;
      box.className = "message " + type;
      box.style.display = "block";
    }

    function getInputs() {
      return {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value.trim()
      };
    }

    function validate(email, password, needPassword = true) {
      if (!email) return showMessage("Enter email", "error"), false;
      if (!email.includes("@")) return showMessage("Invalid email", "error"), false;
      if (needPassword && password.length < 6) return showMessage("Password too short", "error"), false;
      return true;
    }

    // 🔥 Auto redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "./employee.html";
      }
    });

    window.signup = async () => {
      const { email, password } = getInputs();
      if (!validate(email, password)) return;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        window.location.href = "./employee.html";
      } catch (e) {
        showMessage(e.message, "error");
      }
    };

    window.login = async () => {
      const { email, password } = getInputs();
      if (!validate(email, password)) return;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "./employee.html";
      } catch (e) {
        showMessage("Login failed", "error");
      }
    };

    window.resetPassword = async () => {
      const { email } = getInputs();
      if (!validate(email, "", false)) return;

      try {
        await sendPasswordResetEmail(auth, email);
        showMessage("Reset email sent", "success");
      } catch (e) {
        showMessage("Error sending reset", "error");
      }
    };
  </script>
</body>
</html>
