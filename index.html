<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: Arial, sans-serif; padding: 25px; max-width: 500px; margin: auto; background: #f7f7f7; color: #111; }
    .company-name { text-align: center; font-size: 15px; font-weight: bold; letter-spacing: 2px; color: #555; text-transform: uppercase; margin-top: 10px; }
    .card { background: white; padding: 24px; margin-top: 18px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h1 { font-size: 26px; text-align: center; margin-top: 0; }
    textarea { width: 100%; height: 155px; font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    button, a { display: block; width: 100%; padding: 15px; margin-top: 15px; color: white; text-align: center; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; text-decoration: none; box-sizing: border-box; }
    .green-btn { background: #1db954; }
    .blue-btn { background: #0b57d0; }
    .note { font-size: 14px; color: #555; margin-top: 14px; text-align: center; }
  </style>
</head>

<body>

  <div class="company-name" id="businessName">Loading...</div>

  <div class="card">
    <h1>Leave Us a Google Review</h1>

    <p>Here’s a suggested review. Please edit it so it matches your real experience.</p>

    <textarea id="reviewText"></textarea>

    <button class="green-btn" onclick="generateReview()">Generate New Review</button>
    <button class="blue-btn copy-btn" onclick="copyReview()">Copy Suggested Review</button>

    <a id="googleReviewLink" class="green-btn" href="#" onclick="trackClick(event)">
      Open Google Review Page
    </a>

    <p class="note">Please only leave an honest review based on your real experience.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      doc,
      setDoc,
      increment
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
      authDomain: "envisionedmktng.firebaseapp.com",
      projectId: "envisionedmktng",
      storageBucket: "envisionedmktng.firebasestorage.app",
      messagingSenderId: "1075132261537",
      appId: "1:1075132261537:web:2c283114b82d1cee4efce0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const employeeId = params.get("employee");

    const businesses = [
      {
        name: "Wholesome House cleaning of ocala",
        industry: "Cleaning company",
        serviceType: "cleaning service",
        link: "www.google.com/search?client=safari&hs644a9938c05da2e4&hl=en"
      },
      {
        name: "wholesome house cleaning of sarasota",
        industry: "cleaning company",
        serviceType: "cleaning service",
        link: "https://share.google/rqniZWtrmm7sigLfW"
      },{
        name: "wholesome house cleaning of lakewood ranch",
        industry: "cleaning company",
        serviceType: "cleaning service",
        link: "https://share.google/c1j5c1WN72qeIOAWC"
      },
      {
        name: "wholesome house cleaning of bradenton",
        industry: "cleaning company",
        serviceType: "cleaning service",
        link: "https://www.google.com/search?client=safari&hs=Cw7U&sca_esv=b13991bd8b31e71e&hl=en-us&sxsrf=ANbL-n40Iu_WeJBynDYD1YpLQuh2yHi6Rw:1777412877028&q=wholesome+cleaning+services+of+bradenton+reviews&uds=ALYpb_nxTieTaUqWkV0HA30OSyCoy8BJAT5AIHnE95o8ys2a78dUB4bby4YIZ4PslanQjZkMVpPpOxjAY4gNKMvhT0w3m2hnrvWZGysJvxIrJ9COXT5xrHDoVN18NBY4-hSKpmc6VwDrPqFY9k9zqPso6iWfcgGRAAligvjsEMivuTt9arUOPihw5E9WrGwLNb-IJH76yPI49Gss8jHIyCJyDACOByFmMRo-wJa1iNwV2caU7dzVYlmzyFEPddEf-8iAxyyTRCJYclTMl9VhrMEWpMgg5Ev88mLSXJ7GtQ5uAwYY3hn1c48jhq3Kg1hVLpxFIvBg5AKXQC9UozuyFUgGZyjCOlRSvCbA4M0ZIg-V6XlFFmVD1TXxkitykPYSv-z2daggsPcvQYpR4_7TSYgzM7EV9lCTZ8uuUGxuXMST1cmGwhBMR6jrxCVdUwXmooKz1AGm4SKlutCdBUy9oMjxvOv1Ftp0Me1lAhYSooNpnfpAr9ui3Ef80vNhCp2DCb6ss54eLf0nGexklgHV_e5B8CE_xTLsFnZL5urkhPm4Y7xBqeu9mtI&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOaVzfBvgGMc5GMwuEgBMTLTWW34Jg80aDuLOJS8Tim1RgihUdb5s-KJeLxIw3DhOSwOUzZgk0K1PD8raIytONb31WueSDSGzv9INyep4PKx4UItKeIwM8PvFYhCWpcbofNxm7f0%3D&sa=X&ved=2ahUKEwjU4p35wpGUAxXv6BoGHdbVIfYQk8gLegQIGxAB&ictx=1"
      }
    ];

    let currentBusiness = null;

    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function isValidReviewLink(link) {
      return (
        link &&
        link !== "#" &&
        !link.includes("PASTE GOOGLE REVIEW LINK HERE")
      );
    }

    async function updateStat(field) {
      if (!employeeId) return;

      try {
        await setDoc(doc(db, "employees", employeeId), {
          [field]: increment(1),
          lastActivity: new Date().toISOString()
        }, { merge: true });
      } catch (e) {
        console.log("Tracking error:", e.message);
      }
    }

    async function trackScan() {
      await updateStat("scans");

      if (!employeeId) return;

      const uniqueKey = "uniqueScan_" + employeeId;

      if (!localStorage.getItem(uniqueKey)) {
        await updateStat("uniqueScans");
        localStorage.setItem(uniqueKey, "true");
      }
    }

    async function pickRandomBusiness() {
      currentBusiness = random(businesses);

      const businessName = document.getElementById("businessName");
      const reviewBtn = document.getElementById("googleReviewLink");

      businessName.innerText = currentBusiness.name;

      if (isValidReviewLink(currentBusiness.link)) {
        reviewBtn.href = currentBusiness.link;
        reviewBtn.style.display = "block";
      } else {
        reviewBtn.href = "#";
        reviewBtn.style.display = "none";
      }

      generateReview();

      await trackScan();
    }

    const reviewStyles = {
      restaurant: {
        openings: [
          "I had a really good experience at",
          "I enjoyed my visit to",
          "I had a great time at",
          "My visit to",
          "I recently stopped by",
          "I was really impressed with",
          "I had a smooth experience at",
          "I’m glad I chose",
          "I had a positive experience at",
          "From start to finish, I enjoyed"
        ],
        details: [
          "the food was fresh, the service was friendly, and the atmosphere felt welcoming",
          "the staff was helpful, the food came out great, and everything felt clean and comfortable",
          "the service was smooth, the food was good, and the overall experience was enjoyable",
          "the team was welcoming, the food tasted great, and I felt taken care of"
        ],
        endings: [
          "I would definitely come back again.",
          "I’d recommend this spot to anyone looking for a good experience.",
          "Overall, I’m glad I came here.",
          "Definitely worth checking out."
        ]
      },

      "auto repair": {
        openings: [
          "I had a great experience with",
          "I’m glad I brought my vehicle to",
          "My experience with",
          "I recently used"
        ],
        details: [
          "the team was professional, explained everything clearly, and made the process easy",
          "the service was reliable, communication was clear, and they handled everything well",
          "they were helpful, honest, and made sure I understood what was going on"
        ],
        endings: [
          "I would definitely use them again.",
          "I’d recommend them to anyone needing reliable service.",
          "Great experience overall."
        ]
      },

      "cleaning company": {
        openings: [
          "I had a great experience with",
          "I was really happy with the service from",
          "My experience with",
          "I recently used"
        ],
        details: [
          "the team was professional, detailed, and left everything looking fresh",
          "the service was thorough, the team was friendly, and the results were excellent",
          "everything was handled with care, and the space looked much better afterward"
        ],
        endings: [
          "I would definitely recommend them.",
          "I’d gladly use them again.",
          "Great service from start to finish."
        ]
      },

      default: {
        openings: [
          "I had a great experience with",
          "I really appreciated the service from",
          "My experience with",
          "I recently worked with"
        ],
        details: [
          "the team was professional, helpful, and made everything easy",
          "the service was smooth, the staff was friendly, and everything was handled well",
          "they were easy to work with, professional, and made the process simple"
        ],
        endings: [
          "I would definitely recommend them.",
          "I’d gladly use them again.",
          "Great experience overall."
        ]
      }
    };

    window.generateReview = function () {
      if (!currentBusiness) return;

      const industry = currentBusiness.industry || "default";
      const style = reviewStyles[industry] || reviewStyles.default;

      const review = `${random(style.openings)} ${currentBusiness.name}. ${random(style.details)}. ${random(style.endings)}`;

      document.getElementById("reviewText").value = review;
    };

    window.copyReview = async function () {
      const text = document.getElementById("reviewText").value;

      try {
        await navigator.clipboard.writeText(text);

        const btn = document.querySelector(".copy-btn");
        btn.innerText = "Copied ✓";

        setTimeout(() => {
          btn.innerText = "Copy Suggested Review";
        }, 1500);

        await updateStat("copiedReviews");

      } catch (err) {
        alert("Copy failed. Try again.");
      }
    };

    window.trackClick = function (event) {
      event.preventDefault();

      const link = document.getElementById("googleReviewLink").href;

      if (!isValidReviewLink(link)) return;

      window.open(link, "_blank");

      updateStat("reviewClicks");
    };

    pickRandomBusiness();
  </script>

</body>
</html>
