<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 25px;
      max-width: 500px;
      margin: auto;
      background: #f7f7f7;
      color: #111;
    }

    .company-name {
      text-align: center;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .card {
      background: white;
      padding: 24px;
      margin-top: 18px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      height: 155px;
      font-size: 16px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button, a {
      display: block;
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      color: white;
      text-align: center;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
    }

    .green-btn { background: #1db954; }
    .blue-btn { background: #0b57d0; }

    .limit-box {
      background:#f2f2f2;
      padding:10px;
      border-radius:10px;
      text-align:center;
      margin-top:12px;
      font-size:13px;
    }
  </style>
</head>

<body>

  <div class="company-name" id="businessName">Loading...</div>

  <div class="card">

    <textarea id="reviewText"></textarea>

    <button class="green-btn" onclick="generateReview()">Generate Review</button>
    <button class="blue-btn" onclick="copyReview()">Copy Review</button>

    <a id="googleReviewLink" class="green-btn" href="#" onclick="handleClick(event)">
      Leave Google Review
    </a>

    <div class="limit-box" id="limitBox"></div>

  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "envisionedmktng.firebaseapp.com",
  projectId: "envisionedmktng"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const businessId = params.get("business");

let currentBusiness = null;

function today() {
  return new Date().toISOString().split("T")[0];
}

function month() {
  return new Date().toISOString().slice(0,7);
}

function dailyLimit(monthly) {
  return Math.ceil((monthly || 30) / 30);
}

async function loadBusiness() {
  const doc = await db.collection("businesses").doc(businessId).get();

  currentBusiness = { id: doc.id, ...doc.data() };

  document.getElementById("businessName").innerText = currentBusiness.name;

  await resetCounts();
  updateUI();
  generateReview();
}

async function resetCounts() {
  const ref = db.collection("businesses").doc(currentBusiness.id);

  if (currentBusiness.lastResetDate !== today()) {
    await ref.update({
      todayCount: 0,
      lastResetDate: today()
    });
    currentBusiness.todayCount = 0;
  }

  if (currentBusiness.monthKey !== month()) {
    await ref.update({
      currentMonthCount: 0,
      monthKey: month()
    });
    currentBusiness.currentMonthCount = 0;
  }
}

function updateUI() {
  const m = currentBusiness.monthlyLimit || 30;
  const d = currentBusiness.dailyLimit || dailyLimit(m);

  document.getElementById("limitBox").innerText =
    `${currentBusiness.currentMonthCount || 0}/${m} this month • ${currentBusiness.todayCount || 0}/${d} today`;
}

async function handleClick(e) {
  e.preventDefault();

  const m = currentBusiness.monthlyLimit || 30;
  const d = currentBusiness.dailyLimit || dailyLimit(m);

  if ((currentBusiness.todayCount || 0) >= d) {
    alert("Daily limit reached");
    return;
  }

  if ((currentBusiness.currentMonthCount || 0) >= m) {
    alert("Monthly limit reached");
    return;
  }

  await db.collection("businesses").doc(currentBusiness.id).update({
    todayCount: firebase.firestore.FieldValue.increment(1),
    currentMonthCount: firebase.firestore.FieldValue.increment(1)
  });

  currentBusiness.todayCount++;
  currentBusiness.currentMonthCount++;

  updateUI();

  window.open(currentBusiness.reviewLink, "_blank");
}

function generateReview() {
  document.getElementById("reviewText").value =
    "Great experience, highly recommend!";
}

async function copyReview() {
  const text = document.getElementById("reviewText").value;
  await navigator.clipboard.writeText(text);
}

loadBusiness();
</script>

</body>
</html>
