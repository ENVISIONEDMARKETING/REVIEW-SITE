<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: Arial, sans-serif; padding:25px; max-width:500px; margin:auto; background:#f7f7f7; color:#111; }
    .company-name { text-align:center; font-size:15px; font-weight:bold; letter-spacing:2px; color:#555; text-transform:uppercase; margin-top:10px; }
    .card { background:white; padding:24px; margin-top:18px; border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
    h1 { font-size:26px; text-align:center; margin-top:0; }
    textarea { width:100%; height:155px; font-size:16px; padding:12px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; }
    button, a { display:block; width:100%; padding:15px; margin-top:15px; color:white; text-align:center; border:none; border-radius:10px; font-size:16px; font-weight:bold; text-decoration:none; box-sizing:border-box; cursor:pointer; }
    .green-btn { background:#1db954; }
    .blue-btn { background:#0b57d0; }
    .gray-btn { background:#777; pointer-events:none; }
    .note { font-size:14px; color:#555; margin-top:14px; text-align:center; }
    .limit-box { background:#f2f2f2; padding:10px; border-radius:10px; text-align:center; margin-top:12px; font-size:13px; color:#444; }
  </style>
</head>

<body>

  <div class="company-name" id="businessName">Loading...</div>

  <div class="card">
    <h1>Leave Us a Google Review</h1>

    <p>Here’s an AI-generated review suggestion. Please edit it so it matches your real experience.</p>

    <textarea id="reviewText" placeholder="Generating review..."></textarea>

    <button class="green-btn" onclick="generateReview()">Generate New AI Review</button>
    <button class="blue-btn copy-btn" onclick="copyReview()">Copy Suggested Review</button>

    <a id="googleReviewLink" class="green-btn" href="#" onclick="handleReviewClick(event)" rel="noopener noreferrer">
      Open Google Review Page
    </a>

    <div class="limit-box" id="limitBox"></div>

    <p class="note">Please only leave an honest review based on your real experience.</p>
    <p class="note" id="employeeTag"></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
      authDomain: "envisionedmktng.firebaseapp.com",
      projectId: "envisionedmktng",
      storageBucket: "envisionedmktng.firebasestorage.app",
      messagingSenderId: "1075132261537",
      appId: "1:1075132261537:web:2c283114b82d1cee4efce0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const employeeId = params.get("employee") || "default";
    const businessIdFromUrl = params.get("business");

    document.getElementById("employeeTag").innerText = "Employee Tracking ID: " + employeeId;

    let currentBusiness = null;
    let verifiedTodayCount = 0;
    let verifiedMonthCount = 0;

    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function slugify(text) {
      return String(text)
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "");
    }

    function getTodayDate() {
      return new Date().toISOString().split("T")[0];
    }

    function getMonthKey() {
      return new Date().toISOString().slice(0, 7);
    }

    function getWeekKey() {
      const now = new Date();
      const firstDay = new Date(now.getFullYear(), 0, 1);
      const pastDays = Math.floor((now - firstDay) / 86400000);
      const weekNumber = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
      return now.getFullYear() + "-W" + weekNumber;
    }

    function calculateDailyLimit(monthlyLimit) {
      return Math.ceil((monthlyLimit || 30) / 30);
    }

    async function countVerifiedReviews() {
      if (!currentBusiness) return;

      const today = getTodayDate();
      const month = getMonthKey();

      const snap = await db.collection("activityLogs")
        .where("businessId", "==", currentBusiness.id)
        .where("type", "==", "verifiedReview")
        .get();

      verifiedTodayCount = 0;
      verifiedMonthCount = 0;

      snap.forEach(doc => {
        const data = doc.data();

        if (data.date === today) verifiedTodayCount++;
        if (data.month === month) verifiedMonthCount++;
      });
    }

    function updateLimitBox() {
      if (!currentBusiness) return;

      const monthlyLimit = currentBusiness.monthlyLimit || 30;
      const dailyLimit = currentBusiness.dailyLimit || calculateDailyLimit(monthlyLimit);

      document.getElementById("limitBox").innerText =
        `Verified Progress: ${verifiedMonthCount}/${monthlyLimit} this month • ${verifiedTodayCount}/${dailyLimit} today`;
    }

    async function checkVerifiedLimits() {
      await countVerifiedReviews();
      updateLimitBox();

      const monthlyLimit = currentBusiness.monthlyLimit || 30;
      const dailyLimit = currentBusiness.dailyLimit || calculateDailyLimit(monthlyLimit);

      if (currentBusiness.active === false) {
        alert("This business is currently inactive.");
        return false;
      }

      if (verifiedTodayCount >= dailyLimit) {
        alert("This business has reached today’s verified review limit.");
        return false;
      }

      if (verifiedMonthCount >= monthlyLimit) {
        alert("This business has reached its monthly verified review limit.");
        return false;
      }

      return true;
    }

    async function loadBusiness() {
      try {
        if (businessIdFromUrl) {
          const docRef = await db.collection("businesses").doc(businessIdFromUrl).get();

          if (!docRef.exists) {
            document.getElementById("businessName").innerText = "Business Not Found";
            document.getElementById("reviewText").value = "No business found for: " + businessIdFromUrl;
            return;
          }

          currentBusiness = {
            id: docRef.id,
            ...docRef.data()
          };

        } else {
          const snapshot = await db.collection("businesses").get();

          const businesses = snapshot.docs
            .map(doc => ({ id: doc.id, ...doc.data() }))
            .filter(b => b.active !== false && b.reviewLink);

          if (!businesses.length) {
            document.getElementById("businessName").innerText = "No Businesses Found";
            document.getElementById("reviewText").value = "Add businesses in admin.html first.";
            return;
          }

          currentBusiness = random(businesses);
        }

        if (!currentBusiness.reviewLink) {
          document.getElementById("businessName").innerText = currentBusiness.name || "Missing Review Link";
          document.getElementById("reviewText").value = "This business is missing a Google review link.";
          return;
        }

        startReviewPage();

      } catch (error) {
        document.getElementById("businessName").innerText = "Firebase Error";
        document.getElementById("reviewText").value = error.message;
      }
    }

    async function generateReview() {
      if (!currentBusiness) return;

      const allowed = await checkVerifiedLimits();

      if (!allowed) {
        document.getElementById("reviewText").value = "This business has reached its verified review limit for now.";
        return;
      }

      const reviewBox = document.getElementById("reviewText");
      reviewBox.value = "Generating AI review...";

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        const response = await fetch("/api/generate-review", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: controller.signal,
          body: JSON.stringify({
            name: currentBusiness.name || "this business",
            industry: currentBusiness.industry || "business",
            service: currentBusiness.service || currentBusiness.industry || "service"
          })
        });

        clearTimeout(timeout);

        const data = await response.json();
        reviewBox.value = data.review || fallbackReview();

      } catch (error) {
        console.error("AI error:", error);
        reviewBox.value = fallbackReview();
      }
    }

    function fallbackReview() {
      if (!currentBusiness) return "Good experience overall.";

      const options = [
        `I had a good experience with ${currentBusiness.name}. Everything went smoothly and felt easy to deal with.`,
        `${currentBusiness.name} was easy to work with and handled everything well. No complaints from me.`,
        `Overall a solid experience with ${currentBusiness.name}. Things were handled professionally and without issues.`
      ];

      return random(options);
    }

    async function logActivity(type) {
      if (!currentBusiness) return;

      try {
        await db.collection("activityLogs").add({
          type,
          employeeId,
          businessId: currentBusiness.id,
          businessName: currentBusiness.name,
          industry: currentBusiness.industry || "business",
          date: getTodayDate(),
          week: getWeekKey(),
          month: getMonthKey(),
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch (error) {
        console.log("Log error:", error.message);
      }
    }

    async function copyReview() {
      const text = document.getElementById("reviewText").value;

      try {
        await navigator.clipboard.writeText(text);

        const btn = document.querySelector(".copy-btn");
        btn.innerText = "Copied ✓";

        setTimeout(() => {
          btn.innerText = "Copy Suggested Review";
        }, 1500);

        await logActivity("copy");

      } catch (error) {
        alert("Copy failed. Hold down on the text and copy manually.");
      }
    }

    async function handleReviewClick(event) {
      event.preventDefault();

      const allowed = await checkVerifiedLimits();
      if (!allowed) return;

      await logActivity("googleClick");

      window.open(currentBusiness.reviewLink, "_blank");
    }

    async function trackScan() {
      if (!currentBusiness) return;

      await logActivity("scan");

      const uniqueKey = "unique_" + employeeId + "_" + currentBusiness.id + "_" + getTodayDate();

      if (!localStorage.getItem(uniqueKey)) {
        await logActivity("uniqueScan");
        localStorage.setItem(uniqueKey, "true");
      }
    }

    async function startReviewPage() {
      document.getElementById("businessName").innerText = currentBusiness.name;

      const reviewBtn = document.getElementById("googleReviewLink");
      reviewBtn.href = currentBusiness.reviewLink;

      await countVerifiedReviews();
      updateLimitBox();

      generateReview();
      trackScan();
    }

    loadBusiness();
  </script>

</body>
</html>
