<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial;
      padding: 25px;
      max-width: 500px;
      margin: auto;
      background: #f7f7f7;
    }

    .company-name {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      border-radius: 8px;
      border:1px solid #ccc;
    }

    button, a {
      display:block;
      width:100%;
      margin-top:10px;
      padding:12px;
      border-radius:10px;
      color:white;
      text-align:center;
      text-decoration:none;
      border:none;
      cursor:pointer;
    }

    .green { background:#1db954; }
    .blue { background:#0b57d0; }
  </style>
</head>

<body>

<div class="company-name" id="businessName">Loading...</div>

<div class="card">

  <textarea id="reviewText"></textarea>

  <button class="green" onclick="generateReview()">Generate AI Review</button>
  <button class="blue" onclick="copyReview()">Copy Review</button>

  <a id="reviewLink" class="green" href="#" target="_blank">
    Leave Google Review
  </a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "envisionedmktng.firebaseapp.com",
  projectId: "envisionedmktng"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const businessId = params.get("business");

let currentBusiness = null;

async function loadBusiness() {
  const doc = await db.collection("businesses").doc(businessId).get();

  currentBusiness = { id: doc.id, ...doc.data() };

  document.getElementById("businessName").innerText = currentBusiness.name;
  document.getElementById("reviewLink").href = currentBusiness.reviewLink;

  generateReview();
}

async function generateReview() {
  const box = document.getElementById("reviewText");
  box.value = "Generating review...";

  try {
    const res = await fetch("/api/generate-review", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: currentBusiness.name,
        industry: currentBusiness.industry,
        service: currentBusiness.service
      })
    });

    const data = await res.json();

    box.value = data.review || fallbackReview();

  } catch (e) {
    box.value = fallbackReview();
  }
}

function fallbackReview() {
  return `Great experience with ${currentBusiness.name}. Highly recommend!`;
}

async function copyReview() {
  const text = document.getElementById("reviewText").value;
  await navigator.clipboard.writeText(text);
  alert("Copied!");
}

loadBusiness();
</script>

</body>
</html>
