<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: Arial, sans-serif; padding:25px; max-width:500px; margin:auto; background:#f7f7f7; color:#111; }
    .company-name { text-align:center; font-size:15px; font-weight:bold; letter-spacing:2px; color:#555; text-transform:uppercase; margin-top:10px; }
    .card { background:white; padding:24px; margin-top:18px; border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
    h1 { font-size:26px; text-align:center; margin-top:0; }
    textarea { width:100%; height:155px; font-size:16px; padding:12px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; }
    button, a { display:block; width:100%; padding:15px; margin-top:15px; color:white; text-align:center; border:none; border-radius:10px; font-size:16px; font-weight:bold; text-decoration:none; cursor:pointer; }
    .green-btn { background:#1db954; }
    .blue-btn { background:#0b57d0; }
    .gray-btn { background:#777; pointer-events:none; opacity:.75; }
    .note { font-size:14px; color:#555; margin-top:14px; text-align:center; }
  </style>
</head>

<body>

<div class="company-name" id="businessName">Loading...</div>

<div class="card">
  <h1>Leave Us a Google Review</h1>

  <p>Edit the review if needed before posting.</p>

  <textarea id="reviewText" placeholder="Generating review..."></textarea>

  <button class="green-btn" onclick="generateReview()">Generate New AI Review</button>
  <button class="blue-btn copy-btn" onclick="copyReview()">Copy Suggested Review</button>

  <a id="googleReviewLink" class="green-btn" href="#" target="_blank">
    Open Google Review Page
  </a>

  <p class="note" id="employeeTag"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
  authDomain: "envisionedmktng.firebaseapp.com",
  projectId: "envisionedmktng"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const employeeId = params.get("employee") || "default";
const businessId = params.get("business");

document.getElementById("employeeTag").innerText = "Employee: " + employeeId;

let currentBusiness = null;

function today(){ return new Date().toISOString().split("T")[0]; }
function month(){ return new Date().toISOString().slice(0,7); }
function week(){
  const now=new Date();
  const first=new Date(now.getFullYear(),0,1);
  const past=Math.floor((now-first)/86400000);
  return now.getFullYear()+"-W"+Math.ceil((past+first.getDay()+1)/7);
}

async function log(type){
  if(!currentBusiness) return;
  await db.collection("activityLogs").add({
    type,
    employeeId,
    businessId: currentBusiness.id,
    businessName: currentBusiness.name,
    date: today(),
    week: week(),
    month: month(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function loadBusiness(){
  const doc = await db.collection("businesses").doc(businessId).get();
  currentBusiness = { id: doc.id, ...doc.data() };

  document.getElementById("businessName").innerText = currentBusiness.name;

  const btn = document.getElementById("googleReviewLink");
  btn.href = currentBusiness.reviewLink;

  btn.onclick = () => log("googleClick");

  await log("scan");

  generateReview();
}

async function generateReview(){
  if(!currentBusiness) return;

  const box = document.getElementById("reviewText");
  box.value = "Generating AI review...";

  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(),3500);

    const res = await fetch("/api/generate-review",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      signal: controller.signal,
      body: JSON.stringify({
        name: currentBusiness.name,
        industry: currentBusiness.industry,
        service: currentBusiness.service
      })
    });

    clearTimeout(timeout);

    const data = await res.json();

    if(data.review){
      box.value = data.review;
    } else {
      box.value = fallback();
    }

  }catch(e){
    box.value = fallback();
  }
}

function fallback(){
  return `Great experience with ${currentBusiness.name}. Highly recommend their service.`;
}

async function copyReview(){
  const text = document.getElementById("reviewText").value;
  await navigator.clipboard.writeText(text);
  await log("copy");
}

loadBusiness();
</script>

</body>
</html>
