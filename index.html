<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: Arial, sans-serif; padding: 25px; max-width: 500px; margin: auto; background: #f7f7f7; color: #111; }
    .company-name { text-align: center; font-size: 15px; font-weight: bold; letter-spacing: 2px; color: #555; text-transform: uppercase; margin-top: 10px; }
    .card { background: white; padding: 24px; margin-top: 18px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h1 { font-size: 26px; text-align: center; margin-top: 0; }
    textarea { width: 100%; height: 155px; font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    button, a { display: block; width: 100%; padding: 15px; margin-top: 15px; color: white; text-align: center; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; text-decoration: none; box-sizing: border-box; cursor: pointer; }
    .green-btn { background: #1db954; }
    .blue-btn { background: #0b57d0; }
    .note { font-size: 14px; color: #555; margin-top: 14px; text-align: center; }
  </style>
</head>

<body>

  <div class="company-name" id="businessName">Loading...</div>

  <div class="card">
    <h1>Leave Us a Google Review</h1>

    <p>Here’s an AI-generated review suggestion. Please edit it so it matches your real experience.</p>

    <textarea id="reviewText" placeholder="Generating review..."></textarea>

    <button class="green-btn" onclick="generateReview()">Generate New AI Review</button>
    <button class="blue-btn copy-btn" onclick="copyReview()">Copy Suggested Review</button>

    <a id="googleReviewLink" class="green-btn" href="#" target="_blank" rel="noopener noreferrer">
      Open Google Review Page
    </a>

    <p class="note">Please only leave an honest review based on your real experience.</p>
    <p class="note" id="employeeTag"></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_KEY",
      authDomain: "YOUR_FIREBASE_DOMAIN",
      projectId: "YOUR_PROJECT_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const employeeId = params.get("employee") || "default";
    const businessIdFromUrl = params.get("business");

    document.getElementById("employeeTag").innerText = "Employee Tracking ID: " + employeeId;

    let currentBusiness = null;

    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function slugify(text) {
      return String(text).toLowerCase().trim().replace(/[^a-z0-9]+/g, "-");
    }

    async function loadBusiness() {
      const snapshot = await db.collection("businesses").get();
      const businesses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

      currentBusiness = random(businesses);
      startReviewPage();
    }

    async function generateReview() {
      if (!currentBusiness) return;

      const reviewBox = document.getElementById("reviewText");
      reviewBox.value = "Generating AI review...";

      try {
        const response = await fetch("/api/generate-review", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: currentBusiness.name,
            industry: currentBusiness.industry,
            service: currentBusiness.service
          })
        });

        const data = await response.json();
        reviewBox.value = data.review || fallbackReview();

      } catch (error) {
        reviewBox.value = fallbackReview();
      }
    }

    function fallbackReview() {
      return `I had a great experience with ${currentBusiness.name}. Everything was handled professionally and the process felt smooth.`;
    }

    async function copyReview() {
      const text = document.getElementById("reviewText").value;
      await navigator.clipboard.writeText(text);
      alert("Copied!");
    }

    function startReviewPage() {
      document.getElementById("businessName").innerText = currentBusiness.name;
      document.getElementById("googleReviewLink").href = currentBusiness.reviewLink;
      generateReview();
    }

    loadBusiness();
  </script>

</body>
</html>
